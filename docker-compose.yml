version: "3.9"

services:
  php:
    build:
      context: ./docker/php
    container_name: symfony_agenda_php
    ports:
      - "8080:8000"
    volumes:
      - ./backend:/var/www/html
    working_dir: /var/www/html
    command: php -S 0.0.0.0:8000 -t public
    depends_on:
      - db
    networks:
      - app

  db:
    image: postgres:15-alpine
    container_name: symfony_agenda_db
    environment:
      POSTGRES_USER: symfony
      POSTGRES_PASSWORD: symfony
      POSTGRES_DB: symfony_agenda
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app

  node:
    build:
      context: ./docker/node
    container_name: symfony_agenda_node
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"       # Vite dev server en http://localhost:5173
    command: sh -c "npm install && npm run dev"
    networks:
      - app

networks:
  app:

volumes:
  db_data:

